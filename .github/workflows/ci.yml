name: CI

on:
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e "apps/services/itsm-api/[dev]" ruff pytest
      - name: Lint
        run: ruff check apps/services/itsm-api/src/ tests/
      - name: Test
        run: pytest tests/

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: apps/ui
      - run: npm run build
        working-directory: apps/ui

  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Derive TF state storage name
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          SUFFIX=${SUB_ID//-/}
          echo "TF_STATE_STORAGE=stotfitsm${SUFFIX:0:8}" >> $GITHUB_ENV
      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE }}"
      - name: Terraform plan
        working-directory: infra
        run: terraform plan
